version: 2

models:
  - name: stg_market_signals
    description: "Нормализованный слой над live-таблицей public.market_signals из investment-signals."
    columns:
      - name: signal_id
        tests:
          - not_null
          - unique
      - name: quality_score
        tests:
          - not_null
      - name: delivery_status
        tests:
          - not_null

  - name: mart_signal_type_quality
    description: "Качество типов сигналов по тикеру: доля доставки, сила отклонения, статус надежности."
    meta:
      label: "Качество типов сигналов"
      group_label: "Investment Signals"
      metrics:
        total_signal_types:
          type: count
          sql: ${ticker}
          label: "Типов сигналов"
          description: "Количество комбинаций тикер + тип сигнала в витрине качества."
        total_signals:
          type: sum
          sql: signal_count
          label: "Всего сигналов"
        delivered_signals:
          type: sum
          sql: delivered_count
          label: "Доставлено"
        restricted_signals:
          type: sum
          sql: restricted_count
          label: "Ограничено правилами"
        average_quality_score:
          type: average
          sql: avg_quality_score
          label: "Среднее качество"
        avg_delivery_ratio:
          type: average
          sql: delivered_ratio
          label: "Средняя доля доставки"
    columns:
      - name: ticker
        description: "Биржевой тикер инструмента."
        meta:
          dimension:
            type: string
            label: "Тикер"
        tests:
          - not_null
      - name: signal_type
        description: "Тип сигнала из детектора."
        meta:
          dimension:
            type: string
            label: "Тип сигнала"
        tests:
          - not_null
      - name: signal_count
        description: "Сколько сигналов этого типа попало в витрину."
        meta:
          dimension:
            type: number
            hidden: true
      - name: delivered_count
        description: "Сколько сигналов было отправлено во внешний канал."
        meta:
          dimension:
            type: number
            hidden: true
      - name: restricted_count
        description: "Сколько сигналов было ограничено правилами доставки."
        meta:
          dimension:
            type: number
            hidden: true
      - name: high_severity_count
        description: "Количество сигналов с высокой серьезностью."
        meta:
          dimension:
            type: number
            hidden: true
      - name: avg_quality_score
        description: "Средняя оценка качества сигнала."
        meta:
          dimension:
            type: number
            label: "Среднее качество"
      - name: avg_abs_z_score
        description: "Средний модуль z-score по типу сигнала."
        meta:
          dimension:
            type: number
            label: "Средний |z-score|"
      - name: last_detected_at
        description: "Время последнего сигнала этого типа."
        meta:
          dimension:
            type: timestamp
            label: "Последний сигнал"
      - name: delivered_ratio
        description: "Доля доставленных сигналов."
        meta:
          dimension:
            type: number
            label: "Доля доставки"
      - name: quality_status
        description: "Итоговая оценка применимости типа сигнала."
        meta:
          dimension:
            type: string
            label: "Статус качества"
        tests:
          - accepted_values:
              arguments:
                values:
                  - стабильный_кандидат
                  - сильный_сигнал_с_ограничением_доставки
                  - много_шума
                  - наблюдать

  - name: mart_live_trading_watchlist
    description: "Рабочий список сигналов: какие можно рассматривать, какие надо блокировать, какие только наблюдать."
    meta:
      label: "Рабочий список сигналов"
      group_label: "Investment Signals"
      metrics:
        signal_count:
          type: count
          sql: ${signal_id}
          label: "Сигналов"
        avg_decision_score:
          type: average
          sql: decision_score
          label: "Средняя оценка решения"
        avg_quality_score:
          type: average
          sql: quality_score
          label: "Среднее качество"
        delivered_count:
          type: count
          sql: ${signal_id}
          filters:
            - delivery_status: delivered
          label: "Доставлено"
        candidate_count:
          type: count
          sql: ${signal_id}
          filters:
            - trading_decision: кандидат
          label: "Кандидатов"
    columns:
      - name: signal_id
        description: "Уникальный идентификатор сигнала."
        meta:
          dimension:
            type: string
            hidden: true
        tests:
          - not_null
          - unique
      - name: detected_at
        description: "Время обнаружения сигнала."
        meta:
          dimension:
            type: timestamp
            label: "Время сигнала"
      - name: ticker
        description: "Биржевой тикер инструмента."
        meta:
          dimension:
            type: string
            label: "Тикер"
      - name: class_code
        description: "Класс инструмента на бирже."
        meta:
          dimension:
            type: string
            label: "Класс"
      - name: signal_type
        description: "Тип сигнала из детектора."
        meta:
          dimension:
            type: string
            label: "Тип сигнала"
      - name: severity
        description: "Уровень серьезности сигнала."
        meta:
          dimension:
            type: number
            label: "Серьезность"
      - name: z_score
        description: "Сила отклонения от базового уровня."
        meta:
          dimension:
            type: number
            label: "z-score"
      - name: quality_score
        description: "Оценка качества сигнала."
        meta:
          dimension:
            type: number
            label: "Качество"
      - name: delivery_status
        description: "Статус доставки сигнала."
        meta:
          dimension:
            type: string
            label: "Статус доставки"
      - name: decision_score
        description: "Итоговая оценка применимости сигнала."
        meta:
          dimension:
            type: number
            label: "Оценка решения"
      - name: trading_decision
        description: "Итоговое решение по сигналу."
        meta:
          dimension:
            type: string
            label: "Решение"
        tests:
          - accepted_values:
              arguments:
                values:
                  - кандидат
                  - заблокировать_политикой
                  - наблюдать
                  - пропустить
      - name: decision_reason
        description: "Объяснение решения по сигналу."
        meta:
          dimension:
            type: string
            label: "Причина решения"
