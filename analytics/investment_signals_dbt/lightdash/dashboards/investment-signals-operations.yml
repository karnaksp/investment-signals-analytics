    properties:
      title: Как читать панель
      hideTitle: false
      content: |
        ### Главный вопрос

        Эта панель отвечает не на вопрос "сколько сигналов сгенерировано", а на вопрос "какие сигналы можно разбирать и где система теряет полезные идеи".

        Порядок чтения: сначала операционные выводы, затем приоритеты действий, потом узкие места доставки и только после этого рабочий список конкретных сигналов.
