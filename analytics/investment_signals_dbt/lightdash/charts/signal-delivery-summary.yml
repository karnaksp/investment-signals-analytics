contentType: sql_chart
description: Основные показатели по live-сигналам и их доставке.
name: Сводка по сигналам
sql: |
  select
      count(*) as total_signals,
      count(*) filter (where trading_decision = 'кандидат') as review_candidates,
      count(*) filter (where delivery_status = 'delivered') as delivered_signals,
      count(*) filter (where trading_decision = 'заблокировать_политикой') as policy_blocked_signals,
      round(avg(quality_score), 1) as avg_quality_score,
      round(avg(decision_score), 1) as avg_decision_score
  from investment_signals_analytics.mart_live_trading_watchlist
limit: 500
chartKind: table
