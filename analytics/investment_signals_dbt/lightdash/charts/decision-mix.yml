contentType: sql_chart
description: Как система классифицирует сигналы после правил качества и доставки.
name: Распределение решений
sql: |
  select
      trading_decision as decision,
      count(*) as signals,
      round(100.0 * count(*) / sum(count(*)) over (), 1) as share_pct,
      round(avg(decision_score), 1) as avg_decision_score
  from investment_signals_analytics.mart_live_trading_watchlist
  group by 1
  order by signals desc
limit: 500
chartKind: table
