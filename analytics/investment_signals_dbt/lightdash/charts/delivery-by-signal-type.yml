contentType: sql_chart
description: Типы сигналов, где качество есть, но доставка мешает использовать результат.
name: Доставка по типам сигналов
sql: |
  select
      signal_type,
      count(*) as signals,
      count(*) filter (where delivery_status = 'delivered') as delivered,
      count(*) filter (where trading_decision = 'заблокировать_политикой') as policy_blocked,
      round(100.0 * count(*) filter (where delivery_status = 'delivered') / nullif(count(*), 0), 1) as delivered_pct,
      round(avg(quality_score), 1) as avg_quality_score
  from investment_signals_analytics.mart_live_trading_watchlist
  group by 1
  having count(*) >= 5
  order by policy_blocked desc, avg_quality_score desc, signals desc
  limit 12
limit: 500
chartKind: table
