contentType: sql_chart
description: Где политика доставки отсекает потенциально полезные сигналы.
name: Сильные заблокированные сигналы
sql: |
  select
      ticker,
      signal_type,
      count(*) as signals,
      round(avg(quality_score), 1) as avg_quality_score,
      round(avg(decision_score), 1) as avg_decision_score,
      max(detected_at) as last_detected_at
  from investment_signals_analytics.mart_live_trading_watchlist
  where trading_decision = 'заблокировать_политикой'
  group by 1, 2
  having avg(quality_score) >= 75
  order by avg_decision_score desc, signals desc, last_detected_at desc
  limit 15
limit: 500
chartKind: table
