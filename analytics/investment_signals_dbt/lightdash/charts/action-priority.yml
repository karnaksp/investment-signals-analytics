contentType: sql_chart
description: "Приоритеты действий по сигналам: что проверять вручную, что чинить в доставке, что можно оставить в наблюдении."
name: Приоритеты действий
sql: |
  select
      case
          when trading_decision = 'кандидат'
              then '1. Разобрать кандидаты'
          when trading_decision = 'заблокировать_политикой'
              then '2. Проверить правила доставки'
          when trading_decision = 'наблюдать'
              then '3. Наблюдать без действия'
          else '4. Не тратить время'
      end as action_priority,
      count(*) as signals,
      round(avg(quality_score), 1) as avg_quality_score,
      round(avg(decision_score), 1) as avg_decision_score,
      max(detected_at) as last_detected_at
  from investment_signals_analytics.mart_live_trading_watchlist
  group by 1
  order by action_priority
limit: 500
chartKind: table
