contentType: sql_chart
description: Какие типы сигналов дают устойчивое качество, а какие требуют наблюдения.
name: Качество типов сигналов
sql: |
  select
      ticker,
      signal_type,
      signal_count,
      delivered_count,
      restricted_count,
      avg_quality_score,
      avg_abs_z_score,
      delivered_ratio,
      quality_status,
      last_detected_at
  from investment_signals_analytics.mart_signal_type_quality
  order by avg_quality_score desc, signal_count desc
limit: 500
chartKind: table
