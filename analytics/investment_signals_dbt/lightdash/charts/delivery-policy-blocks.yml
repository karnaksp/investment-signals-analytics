contentType: sql_chart
description: Сильные сигналы, которые не стоит использовать без проверки правил доставки.
name: Сигналы, ограниченные правилами
sql: |
  select
      ticker,
      signal_type,
      count(*) as signal_count,
      round(avg(quality_score), 1) as avg_quality_score,
      round(avg(decision_score), 1) as avg_decision_score,
      max(detected_at) as last_detected_at
  from investment_signals_analytics.mart_live_trading_watchlist
  where trading_decision = 'заблокировать_политикой'
  group by 1, 2
  order by avg_decision_score desc, signal_count desc
limit: 500
