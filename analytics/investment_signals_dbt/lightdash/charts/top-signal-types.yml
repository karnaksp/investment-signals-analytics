contentType: sql_chart
description: Типы сигналов с максимальным качеством и понятной применимостью.
name: Лучшие типы сигналов
sql: |
  select
      signal_type,
      count(*) as signals,
      count(*) filter (where delivery_status = 'delivered') as delivered,
      count(*) filter (where trading_decision = 'заблокировать_политикой') as policy_blocked,
      round(avg(quality_score), 1) as avg_quality_score,
      round(avg(decision_score), 1) as avg_decision_score
  from investment_signals_analytics.mart_live_trading_watchlist
  group by 1
  order by avg_quality_score desc, signals desc
  limit 8
limit: 500
