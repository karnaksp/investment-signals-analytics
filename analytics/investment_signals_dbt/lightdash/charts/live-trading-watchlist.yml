contentType: sql_chart
description: Последние сигналы, отсортированные по применимости для ручной проверки.
name: Рабочий список сигналов
sql: |
  select
      detected_at,
      ticker,
      signal_type,
      severity,
      quality_score,
      decision_score,
      delivery_status,
      trading_decision,
      decision_reason
  from investment_signals_analytics.mart_live_trading_watchlist
  order by detected_at desc, decision_score desc
  limit 50
limit: 500
