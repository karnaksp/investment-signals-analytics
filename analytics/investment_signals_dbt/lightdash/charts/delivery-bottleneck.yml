contentType: sql_chart
description: Где теряются сигналы между обнаружением и уведомлением.
name: Воронка доставки
sql: |
  select
      delivery_status,
      count(*) as signals,
      round(100.0 * count(*) / sum(count(*)) over (), 1) as share_pct,
      round(avg(quality_score), 1) as avg_quality_score
  from investment_signals_analytics.mart_live_trading_watchlist
  group by 1
  order by signals desc
limit: 500
chartKind: table
