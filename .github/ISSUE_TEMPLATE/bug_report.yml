---
name: Ошибка
description: Сообщить о проблеме в аналитическом контуре
body:
  - type: textarea
    attributes:
      label: Что произошло?
      description: Опишите проблему и ожидаемый контекст запуска.
      placeholder: >
        Укажите, какая команда или сервис упали, какие данные использовались и что вы увидели.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Что должно было произойти?
      description: Опишите ожидаемое поведение.
      placeholder: >
        Приложите фрагмент логов, ошибку, скриншот Lightdash или Dagster, если это помогает воспроизвести проблему.
  - type: textarea
    attributes:
      label: Как воспроизвести?
      description: >
        Опишите минимальные шаги для повторения ошибки.
      placeholder: >
        Например: docker compose run --rm dbt, затем открыть Lightdash dashboard.
    validations:
      required: true
  - type: input
    attributes:
      label: Операционная система
      description: Укажите ОС и версию Docker.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Версии инструментов
      description: Укажите версии Docker, dbt, Dagster, Lightdash или Python, если запуск был не через контейнер.
      placeholder: Можно приложить вывод `docker compose version`, `dbt --version`.
  - type: markdown
    attributes:
      value: "Спасибо, это поможет быстрее локализовать проблему."
