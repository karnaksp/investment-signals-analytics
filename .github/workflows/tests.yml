name: Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: [ ubuntu-latest ]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11' ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
      - name: Install project
        run: |
          poetry install --with=dev --all-extras
      - name: Install Airflow pkg_resources compatibility dependency
        run: |
          poetry run python -m pip install "setuptools<81"
      - name: Create airflow database
        run: |
          poetry run airflow db migrate
      - name: Validate example Docker Compose demo
        run: |
          bash -n examples/smoke_orchestration.sh
          docker compose -f examples/docker-compose.yaml config --quiet
      - name: Test with pytest
        run: |
          poetry run pytest -q -s -vv --log-cli-level=INFO --cov=dbt_af --cov-report=term tests
      - name: Run Airflow task smoke
        if: matrix.python-version == '3.11'
        run: |
          timeout 180s poetry run pytest -q -s -vv --log-cli-level=INFO --run-airflow-tasks tests -k test_independent_domains_have_correct_dags
